<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>Password Manager - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: clamp(20px, 5vw, 40px);
    }

    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: clamp(20px, 5vw, 40px);
    }

    .logo-img {
      width: clamp(80px, 10vw, 150px);
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(255, 102, 0, 0.3));
    }

    .header-text h1 {
      color: #ff6600;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .header-text p {
      color: #ccc;
      font-size: 14px;
      margin: 5px 0 0 0;
    }

    .add-agent-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

    .add-agent-btn:hover {
      background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(40, 167, 69, 0.3);
      color: white;
    }

    .add-agent-btn:active {
      transform: translateY(0);
    }

    .logout-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #dc3545 0%, #e5535a 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

    .logout-btn:hover {
      background: linear-gradient(135deg, #e5535a 0%, #ff6b6b 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(220, 53, 69, 0.25);
      color: white;
    }

    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .agent-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 24px;
      border: 2px solid rgba(255, 102, 0, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .agent-card:hover {
      border-color: rgba(255, 102, 0, 0.5);
      box-shadow: 0 12px 40px rgba(255, 102, 0, 0.2);
      transform: translateY(-4px);
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      color: #ff6600;
      font-size: 18px;
      font-weight: 700;
      word-break: break-all;
      flex: 1;
    }

    .card-menu {
      position: relative;
    }

    .menu-btn {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .menu-btn:hover {
      background: rgba(255, 102, 0, 0.2);
      color: #ff6600;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: rgba(30, 30, 30, 0.98);
      border: 1px solid rgba(255, 102, 0, 0.3);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      display: none;
      min-width: 150px;
      z-index: 1000;
      overflow: hidden;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      padding: 12px 16px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      transition: all 0.2s ease;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .dropdown-item:hover {
      background: rgba(255, 102, 0, 0.2);
      color: #ff6600;
    }

    .dropdown-item.danger {
      color: #ff6b6b;
    }

    .dropdown-item.danger:hover {
      background: rgba(255, 107, 107, 0.2);
      color: #ff8888;
    }
      .change-master-btn {
        padding: 12px 20px;
        background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
      }

      .change-master-btn:hover {
        background: linear-gradient(135deg, #ff8c33 0%, #ffaa66 100%);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 102, 0, 0.25);
        color: white;
      }
    .card-status {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #ccc;
    }

    .status-label {
      color: #999;
    }

    .status-value {
      color: #ff6600;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      color: #555;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .empty-state-desc {
      font-size: 14px;
      color: #666;
    }

    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: flex-start; /* raise modal vertically */
      justify-content: center;
      padding-top: 15vh; /* shift modal down ~15% */
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: rgba(30, 30, 30, 0.98);
      border-radius: 12px;
      padding: 30px;
      border: 2px solid rgba(255, 102, 0, 0.2);
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      color: #ff6600;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(255, 102, 0, 0.2);
      color: #ff6600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      color: #ccc;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 102, 0, 0.2);
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 15px;
      transition: all 0.3s ease;
      color: #fff;
      width: 100%;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #ff6600;
      box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.1);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder {
      color: #666;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .modal-btn-primary {
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
      color: white;
    }

    .modal-btn-primary:hover {
      background: linear-gradient(135deg, #ff8c33 0%, #ffaa66 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 102, 0, 0.3);
    }

    .modal-btn-secondary {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #ccc;
    }

    .modal-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-content {
        width: 100%;
      }

      .add-agent-btn {
        width: 100%;
        justify-content: center;
      }

      .agents-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
      }
    }
    #toastContainer {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    .copy-toast {
      min-width: 320px;
      max-width: 400px;
      margin-bottom: 0;
      padding: 18px 28px;
      border-radius: 10px;
      color: #fff;
      font-size: 1.2em;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      opacity: 0.95;
      animation: slideIn 0.5s;
    }
    @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-content">
        <img src="{{ url_for('static', filename='RIT Tiger.png') }}" alt="RIT Tiger" class="logo-img">
        <div class="header-text">
          <h1>Password Manager</h1>
        </div>
      </div>
      <div class="header-actions" style="display:flex;gap:12px;align-items:center;">
        <button class="add-agent-btn" onclick="openAddAgentModal()">
          <i class="bi bi-plus-lg"></i>Add Agent
        </button>
        <button class="change-master-btn" onclick="openChangeMasterModal()">
          <i class="bi bi-key"></i>Change Master Password
        </button>
        <button class="logout-btn" onclick="window.location.href='/logout'">
          <i class="bi bi-box-arrow-right"></i>Logout
        </button>
      </div>
    </div>

    <!-- Agents Grid -->
    <div class="agents-grid" id="agentsGrid">
      <!-- Agent cards will be inserted here by JavaScript -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">
        <i class="bi bi-inbox"></i>
      </div>
      <div class="empty-state-text">No agents registered</div>
      <div class="empty-state-desc">Click "Add Agent" to register a new agent</div>
    </div>
    
    <!-- Agent Detail View (hidden until a card is clicked) -->
    <div id="agentDetailView" style="display:none;margin-top:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;">
        <div>
          <button class="add-agent-btn" onclick="closeAgentDetail()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.06);text-transform:none;padding:8px 12px;">
            <i class="bi bi-arrow-left"></i> Back
          </button>
        </div>
        <div style="flex:1;text-align:center;">
          <h2 id="detailHeader" style="margin:0;color:#ff6600;"></h2>
        </div>
        <div style="width:120px"></div>
      </div>

      <div id="usersList" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
  </div>

  <!-- Add Agent Modal -->
  <div class="modal-overlay" id="addAgentModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Add New Agent</h2>
        <button class="modal-close" onclick="closeAddAgentModal()">
          <i class="bi bi-x"></i>
        </button>
      </div>
      <form id="addAgentForm" onsubmit="handleAddAgent(event)">
        <div class="form-group">
          <label for="agentIp" class="form-label">Agent IP Address</label>
          <input 
            type="text" 
            id="agentIp" 
            class="form-control" 
            placeholder="e.g., 192.168.1.100" 
            required
          >
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn modal-btn-secondary" onclick="closeAddAgentModal()">
            Cancel
          </button>
          <button type="submit" class="modal-btn modal-btn-primary">
            Add Agent
          </button>
        </div>
      </form>
    </div>
  </div>

    <!-- Change Master Password Modal -->
    <div class="modal-overlay" id="changeMasterModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Change Master Password</h2>
          <button class="modal-close" onclick="closeChangeMasterModal()">
            <i class="bi bi-x"></i>
          </button>
        </div>
        <form id="changeMasterForm" onsubmit="handleChangeMaster(event)">
          <div class="form-group">
            <label for="newMasterPassword" class="form-label">New Password</label>
            <input type="password" id="newMasterPassword" class="form-control" placeholder="Enter new master password" required>
          </div>
          <div class="form-group">
            <label for="confirmMasterPassword" class="form-label">Confirm Password</label>
            <input type="password" id="confirmMasterPassword" class="form-control" placeholder="Confirm new password" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeChangeMasterModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-primary">Change Password</button>
          </div>
        </form>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let agents = [];

    // Toast notification container
    (function(){
      const container = document.createElement('div');
      container.id = 'toastContainer';
      container.style.position = 'fixed';
      container.style.right = '20px';
      container.style.bottom = '20px';
      container.style.zIndex = '99999';
      container.style.display = 'flex';
      container.style.flexDirection = 'column-reverse';
      container.style.gap = '10px';
      document.body.appendChild(container);
    })();

    // Persist notifications in localStorage so they survive navigation
    function showToast(message, type='info', timeout=8000){
      const container = document.getElementById('toastContainer');
      if(!container) return;
      const now = Date.now();
      const expires = now + timeout;
      // Save to localStorage
      let toasts = [];
      try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
      toasts.push({message, type, expires});
      localStorage.setItem('active_toasts', JSON.stringify(toasts));

      // Render
      renderToast(message, type, expires-now);
    }

    function renderToast(message, type, timeout) {
      const container = document.getElementById('toastContainer');
      if(!container) return;
      const el = document.createElement('div');
      el.className = 'copy-toast';
      if(type==='danger' || type==='fail') {
        el.style.background = 'linear-gradient(135deg, #dc3545 0%, #e5535a 100%)';
      } else if(type==='success') {
        el.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
      } else if(type==='pending' || type==='warning' || type==='orange') {
        el.style.background = 'linear-gradient(135deg, #ff6600 0%, #ff8c33 100%)';
      } else {
        el.style.background = 'rgba(0,0,0,0.9)';
      }
      el.style.border = '2px solid rgba(255,255,255,0.06)';
      el.style.boxShadow = '0 8px 30px rgba(0,0,0,0.6)';
      el.innerText = message;
      el.style.minWidth = '320px';
      el.style.padding = '18px 28px';
      el.style.fontSize = '1.2em';
      el.style.fontWeight = 'bold';
      el.style.letterSpacing = '0.5px';
      el.style.color = '#fff';
      el.style.textShadow = '0 1px 2px rgba(0,0,0,0.18)';
      el.style.borderRadius = '10px';
      container.appendChild(el);
      setTimeout(()=> {
        el.remove();
        // Remove from localStorage
        let toasts = [];
        try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
        toasts = toasts.filter(t => !(t.message===message && t.type===type));
        localStorage.setItem('active_toasts', JSON.stringify(toasts));
      }, timeout);
    }

    // On page load, restore any still-valid toasts
    (function restoreToasts(){
      let toasts = [];
      try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
      const now = Date.now();
      toasts = toasts.filter(t => t.expires > now);
      toasts.forEach(t => renderToast(t.message, t.type, t.expires-now));
      // Clean up expired
      localStorage.setItem('active_toasts', JSON.stringify(toasts));
    })();

    // Polling helpers (mirror agent behavior) so dashboard continues polls
    const ACTIVE_POLLS_DASH = {};
    // Track per-user status on the dashboard to avoid duplicate toasts
    const userStatusDash = {}; // key: ip_username -> status
    // Persist which terminal statuses we've already shown (shared with agent)
    function _readShownStatusesDash(){ try{ return JSON.parse(localStorage.getItem('shown_user_statuses')||'{}'); }catch(e){return{}} }
    function _writeShownStatusesDash(obj){ try{ localStorage.setItem('shown_user_statuses', JSON.stringify(obj)); }catch(e){} }
    function getShownStatusDash(ip, username){ const s = _readShownStatusesDash(); return s[`${ip}_${username}`]; }
    function setShownStatusDash(ip, username, status){ const s = _readShownStatusesDash(); s[`${ip}_${username}`] = status; _writeShownStatusesDash(s); }
    function setUserStatusDash(ip, username, status){
      const key = `${ip}_${username}`;
      if(status === null || status === undefined) delete userStatusDash[key];
      else userStatusDash[key] = status;
    }
    function startPollWorkerDash(ip, username, attempts=5, intervalMs=10000){
      const key = `${ip}||${username}`;
      if(ACTIVE_POLLS_DASH[key]) return;
      let remaining = attempts;
      const doCheck = async ()=>{
        try{
          const resp = await fetch(`/get_users?ip_address=${encodeURIComponent(ip)}`, {headers:{'Accept':'application/json'}});
          if(!resp.ok) throw new Error('fetch failed');
          const data = await resp.json();
          const users = data.users||[];
          const u = users.find(x=>x.username===username);
          if(!u){ remaining = 0; clearAndCleanup(); return; }
          if(u.password_claimed!==2){
            const isGood = (u.password_claimed===0);
            const typ = isGood? 'success' : 'danger';
              const txt = `${username}: ${isGood? 'Password set' : 'Password change failed'}${u.error? ' - '+u.error : ''}`;
              const shown = getShownStatusDash(ip, username);
              if(shown !== u.password_claimed){
                showToast(txt, typ, 10000);
                setShownStatusDash(ip, username, u.password_claimed);
                setUserStatusDash(ip, username, u.password_claimed);
              }
            // update UI if visible
            const row = document.querySelector(`#agentDetailView [data-username="${username}"]`);
            if(row){
              let badge = row.querySelector('.pw-status-badge');
              if(!badge){
                badge = document.createElement('span');
                badge.className = 'pw-status-badge';
                badge.style.marginLeft = '8px';
                badge.style.padding = '6px 8px';
                badge.style.borderRadius = '8px';
                badge.style.fontSize = '13px';
                badge.style.fontWeight = '700';
                (row.querySelector('.username-title') || row.querySelector('div'))?.appendChild(badge);
              }
              badge.innerText = isGood? 'Success' : 'Failed';
              badge.style.background = isGood? 'linear-gradient(90deg,#0a5a0d,#07760e)' : 'linear-gradient(90deg,#5a0a0a,#7b0c0c)';
              badge.style.color = '#fff';
              // reflect status in dashboard's in-memory tracker
              setUserStatusDash(ip, username, u.password_claimed);
            }
            remaining = 0; clearAndCleanup(); return;
          }
          remaining--;
          if(remaining<=0) clearAndCleanup();
        }catch(e){ remaining--; if(remaining<=0) clearAndCleanup(); }
      };
      const timer = setInterval(doCheck, intervalMs);
      ACTIVE_POLLS_DASH[key] = {timer};
      doCheck();
      function clearAndCleanup(){ clearInterval(timer); delete ACTIVE_POLLS_DASH[key]; const stored = JSON.parse(localStorage.getItem('pending_pw_polls')||'[]').filter(s=>!(s.ip===ip && s.username===username)); localStorage.setItem('pending_pw_polls', JSON.stringify(stored)); }
    }

    // resume any pending polls stored by agent page
    (function resumePollsDash(){
      try{
        const stored = JSON.parse(localStorage.getItem('pending_pw_polls')||'[]');
        (stored||[]).forEach(s=> startPollWorkerDash(s.ip,s.username,s.attempts||5,10000));
      }catch(e){}
    })();

    async function fetchAgents() {
      try {
        const response = await fetch('/get_clients', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        agents = data.clients || [];
        renderAgents();
      } catch (err) {
        console.error('Error fetching agents:', err);
      }
    }

    function renderAgents() {
      const grid = document.getElementById('agentsGrid');
      const emptyState = document.getElementById('emptyState');

      if (agents.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = agents.map((agent, index) => {
        // Build extra info rows dynamically from additional fields
        let extraHtml = '';
        for (const [k, v] of Object.entries(agent)) {
          if (k === 'ip_address' || k === 'status') continue;
          extraHtml += `<div class="status-item"><span class="status-label">${k.replace(/_/g,' ')}:</span><span class="status-value">${v===null||v===undefined? 'N/A' : v}</span></div>`;
        }

        return `
        <div class="agent-card" onclick="window.location.href='/agent?ip=' + encodeURIComponent('${agent.ip_address}')">
          <div class="card-header-row">
            <div class="card-title">${agent.ip_address}</div>
            <div class="card-menu" onclick="event.stopPropagation()">
              <button class="menu-btn" onclick="toggleMenu(${index}, event)">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <div class="dropdown-menu" id="menu-${index}">
                <button class="dropdown-item" onclick="resetToken('${agent.ip_address}')">
                  <i class="bi bi-arrow-clockwise"></i>
                  Reset Token
                </button>
                <button class="dropdown-item danger" onclick="removeAgent('${agent.ip_address}')">
                  <i class="bi bi-trash"></i>
                  Remove Client
                </button>
              </div>
            </div>
          </div>
          <div class="card-status">
            <div class="status-item">
              <span class="status-label">Status:</span>
              <span class="status-value">${agent.status}</span>
            </div>
            ${extraHtml}
          </div>
        </div>`;
      }).join('');
    }

    function toggleMenu(index) {
      const menu = document.getElementById(`menu-${index}`);
      // Close all other menus
      document.querySelectorAll('.dropdown-menu').forEach((m, i) => {
        if (i !== index) m.classList.remove('show');
      });
      menu.classList.toggle('show');
      
      // Close menu when clicking outside
      document.addEventListener('click', function closeMenu(e) {
        if (!e.target.closest('.card-menu')) {
          menu.classList.remove('show');
          document.removeEventListener('click', closeMenu);
        }
      });
    }

    // Open agent detail view
    async function openAgentDetail(ipAddress) {
      try {
        document.querySelector('.dashboard-container').style.display = 'none';
        const detail = document.getElementById('agentDetailView');
        detail.style.display = 'block';
        document.getElementById('detailHeader').innerText = `Agent: ${ipAddress}`;
        const usersList = document.getElementById('usersList');
        usersList.innerHTML = '<div class="empty-state-text">Loading users...</div>';

        const resp = await fetch(`/get_users?ip_address=${encodeURIComponent(ipAddress)}`, { method: 'GET', headers: { 'Accept': 'application/json' } });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const users = data.users || [];

        if (users.length === 0) {
          usersList.innerHTML = '<div class="empty-state-text">No users found for this agent</div>';
          return;
        }

        // show any per-user errors as toasts (only once, determined by current status)
        users.forEach(u => {
          if(!u.error) return;
          try{
            const shown = getShownStatusDash(ipAddress, u.username);
            if(shown !== 1){
              showToast(`${u.username}: ${u.error}`, 'danger', 7000);
              setShownStatusDash(ipAddress, u.username, 1);
              setUserStatusDash(ipAddress, u.username, 1);
            }
          }catch(e){}
        });

        usersList.innerHTML = users.map((u, i) => {
          return `
          <div data-ip="${ipAddress}" data-username="${u.username}" style="background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <div style="flex:1;">
              <div class="username-title" style="font-weight:700;color:#ff6600">${u.username}</div>
              <div style="font-size:13px;color:#ccc">Password set: ${u.password_exists ? 'Yes' : 'No'}</div>
              ${u.error ? `<div style=\"font-size:13px;color:#ff6b6b;margin-top:6px\">Error: ${u.error}</div>` : ''}
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="modal-btn modal-btn-secondary" onclick="revealPassword('${u.username}')">Reveal</button>
              <button class="modal-btn modal-btn-primary" onclick="setPassword('${u.username}')">Set Password</button>
            </div>
          </div>
        `}).join('');

        // Set status badges after rendering
        users.forEach(u => {
          if (u.password_claimed === 0 || u.password_claimed === 1 || u.password_claimed === 2) {
            setUserStatus(ipAddress, u.username, u.password_claimed);
          } else {
            setUserStatus(ipAddress, u.username, null);
          }
        });

      } catch (err) {
        console.error('Error opening agent detail:', err);
        showToast('Failed to load agent users', 'danger');
      }
    }

    function closeAgentDetail(){
      document.getElementById('agentDetailView').style.display = 'none';
      document.querySelector('.dashboard-container').style.display = '';
    }

    // Dummy reveal/set implementations
    function revealPassword(username){
      showToast(`Password for ${username}: ******** (dummy)`, 'info', 4000);
    }

    function setPassword(username){
      const pw = prompt(`Set new password for ${username} (dummy):`,'hunter2');
      if(pw!==null){
        showToast(`Password for ${username} set to: ${pw} (dummy)`, 'info');
      }
    }

    async function removeAgent(ipAddress) {
      if (confirm(`Remove agent ${ipAddress}?`)) {
        try {
          const formData = new FormData();
          formData.append('ip_address', ipAddress);
          const response = await fetch('/remove_client', {
            method: 'POST',
            body: formData
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          await fetchAgents();
        } catch (err) {
          console.error('Error removing agent:', err);
          showToast('Failed to remove agent', 'danger');
        }
      }
    }

    async function resetToken(ipAddress) {
      try {
        const formData = new FormData();
        formData.append('ip_address', ipAddress);
        const response = await fetch('/reset_client_token', {
          method: 'POST',
          body: formData
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        await fetchAgents();
        showToast(`Token reset for ${ipAddress}`, 'info');
      } catch (err) {
        console.error('Error resetting token:', err);
        showToast('Failed to reset token', 'danger');
      }
    }

    function openAddAgentModal() {
      document.getElementById('addAgentModal').classList.add('show');
    }

    function closeAddAgentModal() {
      document.getElementById('addAgentModal').classList.remove('show');
      document.getElementById('addAgentForm').reset();
    }

    async function handleAddAgent(event) {
      event.preventDefault();
      const ip = document.getElementById('agentIp').value.trim();
      
      if (!ip) {
        showToast('Please enter an IP address', 'danger');
        return;
      }

      try {
        const formData = new FormData();
        formData.append('ip_address', ip);
        const response = await fetch('/add_client', {
          method: 'POST',
          body: formData
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        await fetchAgents();
        closeAddAgentModal();
      } catch (err) {
        console.error('Error adding agent:', err);
        showToast('Failed to add agent', 'danger');
      }
    }

    // Close modal when clicking outside
    document.getElementById('addAgentModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeAddAgentModal();
      }
    });

    // Initial load and refresh every 10 seconds
    fetchAgents();
    setInterval(fetchAgents, 10000);
  </script>
  <script>
    function openChangeMasterModal() {
      document.getElementById('changeMasterModal').classList.add('show');
    }

    function closeChangeMasterModal() {
      document.getElementById('changeMasterModal').classList.remove('show');
      document.getElementById('changeMasterForm').reset();
    }

    async function handleChangeMaster(e) {
      e.preventDefault();
      const newPw = document.getElementById('newMasterPassword').value;
      const confirmPw = document.getElementById('confirmMasterPassword').value;
      if (newPw !== confirmPw) {
        showToast('Passwords do not match', 'danger');
        return;
      }

      try {
        const formData = new FormData();
        formData.append('new_password', newPw);
        const resp = await fetch('/set_master_password', {
          method: 'POST',
          body: formData
        });
        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(text || `HTTP ${resp.status}`);
        }
        showToast('Master password change request submitted', 'info');
        closeChangeMasterModal();
      } catch (err) {
        console.error('Error changing master password:', err);
        showToast('Failed to change master password', 'danger');
      }
    }

    // Close modal when clicking outside
    document.getElementById('changeMasterModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeChangeMasterModal();
      }
    });
  </script>
</body>
</html>
