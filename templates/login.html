<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>Password Manager - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      height: 100vh;
      padding: clamp(10px, 5vw, 40px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 90vw;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 5vw, 60px);
    }

    .side-logo {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: fit-content;
    }

    .side-logo img {
      width: clamp(90px, 12vw, 210px);
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(255, 102, 0, 0.3));
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: clamp(10px, 2vw, 20px);
      padding: clamp(25px, 4vw, 50px);
      box-shadow: 0 20px 60px rgba(255, 102, 0, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 102, 0, 0.1);
      flex: 0 1 auto;
      min-width: 300px;
      width: clamp(300px, 90vw, 450px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .center-logo img {
      width: clamp(150px, 25vw, 350px);
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff6600, transparent);
      margin: 0 auto;
    }

    .header-text {
      color: #ff6600;
      font-size: 28px;
      font-weight: 700;
      margin: 15px 0 5px 0;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      color: #000;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 15px;
      transition: all 0.3s ease;
      color: #000;
    }

    .form-control:focus {
      background: #fff;
      border-color: #ff6600;
      box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.1);
      color: #1a1a2e;
    }

    .form-control::placeholder {
      color: #999;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .login-btn:hover {
      background: linear-gradient(135deg, #ff8c33 0%, #ffaa66 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 102, 0, 0.3);
      box-shadow: 0 10px 25px rgba(227, 30, 36, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .alert-container {
      margin-bottom: 20px;
    }

    .alert {
      border-radius: 8px;
      border: none;
      padding: 12px 15px;
      font-size: 14px;
      color: #fff;
    }
    .alert-danger {
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
    }

    .alert-warning {
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
      color: #fff;
      color: #333;
    }

    .alert-success {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    }

    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
        gap: 20px;
      }

      .login-card {
        padding: 30px 20px;
      }

      .side-logo img {
        max-width: 80px;
      }

      .center-logo img {
        max-width: 100px;
      }

      .header-text {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-wrapper">
      <!-- Left Tiger Logo -->
      <div class="side-logo">
        <img src="{{ url_for('static', filename='RIT Tiger.png') }}" alt="RIT Tiger Logo">
      </div>

      <div class="login-card">
        <!-- Logo Section -->
        <div class="logo-section">
          <div class="center-logo">
            <img src="{{ url_for('static', filename='RIT Name.png') }}" alt="RIT Name Logo">
          </div>
          <div class="divider"></div>
          <h1 class="header-text">Password Manager</h1>
        </div>

        <!-- Flash Messages -->
        <div class="alert-container">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category if category != 'error' else 'danger' }}">{{ message }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}
        </div>

        <!-- Login Form -->
        <form method="post" action="{{ url_for('login') }}">
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
          </div>

          <input type="hidden" name="next" value="{{ next or '' }}">
          <button class="login-btn" type="submit">Sign In</button>
        </form>
      </div>

      <!-- Right Tiger Logo -->
      <div class="side-logo">
        <img src="{{ url_for('static', filename='RIT Tiger.png') }}" alt="RIT Tiger Logo">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
