<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>Agent Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    body{background:linear-gradient(135deg,#000,#111);color:#fff;font-family:Segoe UI,Arial;padding:24px}
    .container{max-width:900px;margin:0 auto}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .header h2{color:#ff6600;margin:0}
    .user-row{background:rgba(255,255,255,0.03);padding:14px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .label{color:#ccc;font-size:13px}
    .value{color:#fff;font-weight:600}
    /* Reveal button: like Add Agent */
    .btn-reveal {
      padding: 12px 24px;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .btn-reveal:hover {
      background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(40, 167, 69, 0.3);
      color: white;
    }
    .btn-reveal:active {
      transform: translateY(0);
    }

    /* Set Password button: like Change Master Password */
    .btn-set {
      padding: 12px 20px;
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .btn-set:hover {
      background: linear-gradient(135deg, #ff8c33 0%, #ffaa66 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 102, 0, 0.25);
      color: white;
    }
    .btn-set:active {
      transform: translateY(0);
    }
    .empty{color:#999;padding:40px;text-align:center}
    .password-box{background:rgba(255,102,0,0.15);border:2px solid #ff6600;padding:12px 16px;border-radius:8px;font-size:16px;font-weight:700;color:#fff;font-family:monospace;cursor:pointer;user-select:none;min-width:120px;display:none}
    .password-box:hover{background:rgba(255,102,0,0.25)}
    #toastContainer {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    .copy-toast {
      min-width: 320px;
      max-width: 400px;
      margin-bottom: 0;
      padding: 18px 28px;
      border-radius: 10px;
      color: #fff;
      font-size: 1.2em;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      opacity: 0.95;
      animation: fadein 0.5s;
    }
    .toast-success { background: #28a745; }
    .toast-danger { background: #dc3545; }
    .toast-info { background: #007bff; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 0.95; } }
    .pw-status-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.95em;
      vertical-align: middle;
      color: #fff;
    }
    .pw-status-badge-success { background: #28a745; }
    .pw-status-badge-failed { background: #dc3545; }
    .pw-status-badge-pending { background: #ffc107; color: #333; }

    /* Modal Styles (copied from dashboard Add Agent modal to match exactly) */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: flex-start; /* raise modal vertically */
      justify-content: center;
      padding-top: 15vh; /* shift modal down ~15% */
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: rgba(30, 30, 30, 0.98);
      border-radius: 12px;
      padding: 30px;
      border: 2px solid rgba(255, 102, 0, 0.2);
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      color: #ff6600;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(255, 102, 0, 0.2);
      color: #ff6600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      color: #ccc;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      display: block;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 102, 0, 0.2);
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 15px;
      transition: all 0.3s ease;
      color: #fff;
      width: 100%;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #ff6600;
      box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.1);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder {
      color: #666;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .modal-btn-primary {
      background: linear-gradient(135deg, #ff6600 0%, #ff8c33 100%);
      color: white;
    }

    .modal-btn-primary:hover {
      background: linear-gradient(135deg, #ff8c33 0%, #ffaa66 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 102, 0, 0.3);
    }

    .modal-btn-green {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
    }

    .modal-btn-green:hover {
      background: linear-gradient(135deg, #20c997 0%, #17a673 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(40, 167, 69, 0.25);
    }

    .modal-btn-secondary {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #ccc;
    }

    .modal-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="display:flex;gap:12px;align-items:center">
        <button onclick="goBack()" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:#fff;padding:8px 12px;border-radius:6px"><i class="bi bi-arrow-left"></i></button>
        <h2 id="agentHeader">Agent</h2>
      </div>
      <div style="display:flex;align-items:center">
        <button id="addMiscUserBtn" class="btn-reveal" style="display:none;margin-left:8px;" onclick="openAddMiscModal()"><i class="bi bi-plus-lg"></i>&nbsp;Add User</button>
      </div>
    </div>

    <div id="usersContainer"></div>

    <!-- Set Password Modal -->
    <div class="modal-overlay" id="setPwdModal" style="display:none;">
      <div class="modal-content" style="max-width:420px;">
        <div class="modal-header">
          <h3 class="modal-title">Set Password</h3>
          <button class="modal-close" onclick="closeSetModal()"><i class="bi bi-x"></i></button>
        </div>
        <form id="setPwdForm" onsubmit="submitSetPwd(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="setPwdUsername" class="form-control" readonly />
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="setPwdValue" class="form-control" placeholder="Enter new password" required />
          </div>
          <div>
            <button type="button" id="useRandomPwdBtn" class="modal-btn modal-btn-green" style="width:100%;height:100%" onclick="useRandomPassword()">Use Secure Random Password</button>
          </div>
          <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeSetModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-primary">Set Password</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Add Misc User Modal -->
    <div class="modal-overlay" id="addMiscModal" style="display:none;">
      <div class="modal-content" style="max-width:420px;">
        <div class="modal-header">
          <h3 class="modal-title">Add User</h3>
          <button class="modal-close" onclick="closeAddMiscModal()"><i class="bi bi-x"></i></button>
        </div>
        <form id="addMiscForm" onsubmit="submitAddMisc(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="addMiscUsername" class="form-control" placeholder="Enter username" required />
          </div>
          <div class="form-group">
            <label class="form-label">Service</label>
            <input type="text" id="addMiscService" class="form-control" placeholder="e.g., Web, DB, API" required />
          </div>
          <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeAddMiscModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-primary">Create User</button>
          </div>
        </form>
      </div>
    </div>

  </div>

<script>
  let currentAgentIp = null;

  // Toast notification container
  (function(){
    const container = document.createElement('div');
    container.id = 'toastContainer';
    container.style.position = 'fixed';
    container.style.right = '20px';
    container.style.bottom = '20px';
    container.style.zIndex = '99999';
    container.style.display = 'flex';
    container.style.flexDirection = 'column-reverse';
    container.style.gap = '10px';
    document.body.appendChild(container);
  })();

  // Persist notifications in localStorage so they survive navigation
    function showToast(message, type='info', timeout=8000){
      const container = document.getElementById('toastContainer');
      if(!container) return;
      const now = Date.now();
      const expires = now + timeout;
      // Save to localStorage
      let toasts = [];
      try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
      toasts.push({message, type, expires});
      localStorage.setItem('active_toasts', JSON.stringify(toasts));

      // Render
      renderToast(message, type, expires-now);
    }

  function renderToast(message, type, timeout) {
      const container = document.getElementById('toastContainer');
      if(!container) return;
      const el = document.createElement('div');
      el.className = 'copy-toast';
      if(type==='danger' || type==='fail') {
        el.style.background = 'linear-gradient(135deg, #dc3545 0%, #e5535a 100%)';
      } else if(type==='success') {
        el.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
      } else if(type==='pending' || type==='warning' || type==='orange') {
        el.style.background = 'linear-gradient(135deg, #ff6600 0%, #ff8c33 100%)';
      } else {
        el.style.background = 'rgba(0,0,0,0.9)';
      }
      el.style.border = '2px solid rgba(255,255,255,0.06)';
      el.style.boxShadow = '0 8px 30px rgba(0,0,0,0.6)';
      el.innerText = message;
      el.style.minWidth = '320px';
      el.style.padding = '18px 28px';
      el.style.fontSize = '1.2em';
      el.style.fontWeight = 'bold';
      el.style.letterSpacing = '0.5px';
      el.style.color = '#fff';
      el.style.textShadow = '0 1px 2px rgba(0,0,0,0.18)';
      el.style.borderRadius = '10px';
      container.appendChild(el);
      setTimeout(()=> {
        el.remove();
        // Remove from localStorage
        let toasts = [];
        try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
        toasts = toasts.filter(t => !(t.message===message && t.type===type));
        localStorage.setItem('active_toasts', JSON.stringify(toasts));
      }, timeout);
    }

    // On page load, restore any still-valid toasts
    (function restoreToasts(){
      let toasts = [];
      try { toasts = JSON.parse(localStorage.getItem('active_toasts')||'[]'); } catch(e){}
      const now = Date.now();
      toasts = toasts.filter(t => t.expires > now);
      toasts.forEach(t => renderToast(t.message, t.type, t.expires-now));
      // Clean up expired
      localStorage.setItem('active_toasts', JSON.stringify(toasts));
    })();

  // Status tracking by ip+username
  const userStatus = {}; // key: ip_username, value: status
  // Persist which terminal statuses we've already shown for users to avoid duplicate toasts across navigation
  function _readShownStatuses(){
    try{
      const raw = localStorage.getItem('shown_user_statuses');
      if(!raw) return {};
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed === 'object') return parsed;
      return {};
    }catch(e){
      return {};
    }
  }
  function _writeShownStatuses(obj){ try{ localStorage.setItem('shown_user_statuses', JSON.stringify(obj)); }catch(e){} }
  function getShownStatus(ip, username){ const s = _readShownStatuses(); return s[`${ip}_${username}`]; }
  function hasShownStatus(ip, username){ const s = _readShownStatuses(); return Object.prototype.hasOwnProperty.call(s, `${ip}_${username}`); }
  function setShownStatus(ip, username, status){ const s = _readShownStatuses(); s[`${ip}_${username}`] = status; _writeShownStatuses(s); }
  function setUserStatus(ip, username, status) {
    const key = `${ip}_${username}`;
    if (status === null || status === undefined) {
      delete userStatus[key];
    } else {
      userStatus[key] = status;
    }
    updateStatusBadge(ip, username);
  }
  function updateStatusBadge(ip, username) {
    const key = `${ip}_${username}`;
    const badgeId = `status-badge-${key}`;
    let badge = document.getElementById(badgeId);
    if (badge) badge.remove();
    const userRow = document.querySelector(`[data-ip="${ip}"][data-username="${username}"]`);
    if (!userRow) return;
    const status = userStatus[key];
    if (status === undefined || status === null || status === 'unset') return; // Only show if status is known and not unset
    badge = document.createElement('span');
    badge.id = badgeId;
    if (status == 0) {
      badge.className = "pw-status-badge pw-status-badge-success";
      badge.innerText = "Password Set";
    } else if (status == 2 || status === 'pending') {
      badge.className = "pw-status-badge pw-status-badge-pending";
      badge.innerText = "Pending";
    } else if (status == 1) {
      badge.className = "pw-status-badge pw-status-badge-failed";
      badge.innerText = "Failed";
    }
    userRow.querySelector('.value').appendChild(badge);
  }

  // Polling for password change status (persists via localStorage so it continues across pages)
  const ACTIVE_POLLS = {};
  function enqueuePoll(ip, username, attempts=5, intervalMs=10000){
    const key = `${ip}||${username}`;
    const stored = JSON.parse(localStorage.getItem('pending_pw_polls')||'[]');
    const exists = stored.find(s => s.ip===ip && s.username===username);
    if(!exists){
      stored.push({ip, username, attempts});
      localStorage.setItem('pending_pw_polls', JSON.stringify(stored));
    }
    if(!ACTIVE_POLLS[key]) startPollWorker(ip, username, attempts, intervalMs);
  }

  function startPollWorker(ip, username, attempts=5, intervalMs=10000){
    const key = `${ip}||${username}`;
    if(ACTIVE_POLLS[key]) return;
    let remaining = attempts;
    const doCheck = async ()=>{
      try{
        const resp = await fetch(`/get_users?ip_address=${encodeURIComponent(ip)}`, {headers:{'Accept':'application/json'}});
        if(!resp.ok) throw new Error('fetch failed');
        const data = await resp.json();
        const users = data.users||[];
        const u = users.find(x=>x.username===username);
        if(!u){ remaining = 0; clearAndCleanup(); return; }
        // If status moved from pending (2) to terminal (0 or 1) stop polling and notify
        if(u.password_claimed!==2){
          // per-user result: treat 0 as success (green), 1 as failure (red)
          const isGood = (u.password_claimed===0);
          const typ = isGood? 'success' : 'danger';
          const txt = `${username}: ${isGood? 'Password set' : 'Password change failed'}${u.error? ' - '+u.error : ''}`;
          // Only show toast when we haven't already shown this terminal status for this user
          const statusKey = `${ip}_${username}`;
          const shown = getShownStatus(ip, username);
          // const hasShown = hasShownStatus(ip, username);
          console.log(shown)
          // console.log(hasShown)
          if(shown === 0){
            showToast(txt, typ, 10000);
            setShownStatus(ip, username, 1);
            setUserStatus(ip, username, u.password_claimed);
          }
          remaining = 0;
          clearAndCleanup();
          return;
        }
        remaining--;
        if(remaining<=0){ clearAndCleanup(); }
      }catch(e){
        remaining--;
        if(remaining<=0) clearAndCleanup();
      }
    };
    const timer = setInterval(doCheck, intervalMs);
    ACTIVE_POLLS[key] = {timer};
    // run immediately once
    doCheck();

    function clearAndCleanup(){
      clearInterval(timer);
      delete ACTIVE_POLLS[key];
      const stored = JSON.parse(localStorage.getItem('pending_pw_polls')||'[]').filter(s=>!(s.ip===ip && s.username===username));
      localStorage.setItem('pending_pw_polls', JSON.stringify(stored));
    }
  }

  // On load resume any pending polls
  (function resumePolls(){
    try{
      const stored = JSON.parse(localStorage.getItem('pending_pw_polls')||'[]');
      (stored||[]).forEach(s=> startPollWorker(s.ip,s.username,s.attempts||5,10000));
    }catch(e){}
  })();

  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function goBack(){ window.location.href = '/dashboard' }

  // Attach event listeners once to the users container using event delegation
  const container = document.getElementById('usersContainer');
  let isDragging = false;
  function sanitizeName(n){ return String(n).replace(/[^a-zA-Z0-9_-]/g, '_'); }

  function loadUserOrder(ip){
    try{ return JSON.parse(localStorage.getItem('user_order::' + ip) || '[]'); }catch(e){ return []; }
  }

  function saveUserOrderFromDOM(ip){
    const container = document.getElementById('usersContainer');
    const order = Array.from(container.querySelectorAll('.user-row')).map(el=>el.dataset.username);
    try{ localStorage.setItem('user_order::' + ip, JSON.stringify(order)); }catch(e){}
  }

  function applyStoredUserOrder(freshUsers, ip){
    const stored = loadUserOrder(ip);
    const current = freshUsers.map(u=>u.username);
    const newOnes = current.filter(u => stored.indexOf(u)===-1);
    const ordered = [...newOnes, ...stored.filter(u => current.indexOf(u)!==-1 && newOnes.indexOf(u)===-1)];
    ordered.push(...current.filter(u=> ordered.indexOf(u)===-1));
    const orderedUsers = ordered.map(username => freshUsers.find(u=>u.username===username)).filter(Boolean);
    try{ localStorage.setItem('user_order::' + ip, JSON.stringify(orderedUsers.map(u=>u.username))); }catch(e){}
    return orderedUsers;
  }

  function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.user-row:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function attachUserDragHandlers(ip){
    const container = document.getElementById('usersContainer');
    const rows = container.querySelectorAll('.user-row');
    rows.forEach(row => {
      row.setAttribute('draggable', 'true');
      row.ondragstart = function(e){
        isDragging = true;
        this.classList.add('dragging');
        try{ e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', this.dataset.username); }catch(e){}
      };
      row.ondragend = function(){
        isDragging = false;
        this.classList.remove('dragging');
        saveUserOrderFromDOM(ip);
      };
    });

    container.ondragover = function(e){
      e.preventDefault();
      const after = getDragAfterElement(container, e.clientY);
      const dragging = document.querySelector('.user-row.dragging');
      if(!dragging) return;
      if(after == null) container.appendChild(dragging);
      else container.insertBefore(dragging, after);
    };
    container.ondrop = function(e){ e.preventDefault(); saveUserOrderFromDOM(ip); };
  }

  container.addEventListener('click', (e) => {
    if(isDragging) return;
    if(e.target.classList.contains('btn-reveal')) {
      e.preventDefault();
      e.stopPropagation();
      const username = e.target.dataset.usernameReveal;
      const action = e.target.dataset.action;
      if(action === 'reveal') {
        reveal(username);
      } else if(action === 'hide') {
        hide(username);
      }
    }
    if(e.target.classList.contains('btn-set')) {
      e.preventDefault();
      e.stopPropagation();
      const username = e.target.dataset.usernameSet;
      openSetModal(username);
    }
    if(e.target.classList.contains('password-box')) {
      e.preventDefault();
      e.stopPropagation();
      const password = e.target.innerText;
      navigator.clipboard.writeText(password).then(() => {
        showToast('✓ Copied to clipboard', 'info', 2000);
      }).catch(() => {
        showToast('Failed to copy password', 'danger');
      });
    }
  });

  async function loadUsers(ip){
    currentAgentIp = ip;
    const container = document.getElementById('usersContainer');
    container.innerHTML = '<div class="empty">Loading users...</div>';
    try{
      const resp = await fetch(`/get_users?ip_address=${encodeURIComponent(ip)}`, {headers:{'Accept':'application/json'}});
      if(!resp.ok) throw new Error('Failed to fetch');
      const data = await resp.json();
      const users = data.users || [];
      if(users.length===0){ container.innerHTML = '<div class="empty">No users found</div>'; return }

      function sanitizeName(n){ return n.replace(/[^a-z0-9_-]/gi,'_'); }
      // show any per-user errors as toasts and include error in UI where present
      users.forEach(u => {
        try{
          const statusKey = `${currentAgentIp}_${u.username}`;
          // initialize in-memory status if server provided it
          if(typeof u.password_claimed !== 'undefined') setUserStatus(currentAgentIp, u.username, u.password_claimed);
          // show any per-user errors as toasts, but only once (persisted)
          if(u.error){
            const shown = getShownStatus(currentAgentIp, u.username);
            const hasShown = hasShownStatus(currentAgentIp, u.username);
            if(!hasShown || String(shown) !== '1'){
              showToast(`${u.username}: ${u.error}`, 'danger', 7000);
              setShownStatus(currentAgentIp, u.username, 1);
              setUserStatus(currentAgentIp, u.username, 1);
            }
          }
        }catch(e){}
      });

      // Apply stored order for this agent (new users first)
      const ordered = applyStoredUserOrder(users, currentAgentIp);

      container.innerHTML = ordered.map(u => {
        const id = sanitizeName(u.username);
        const revealBtn = u.password_exists ? `<button class="btn-reveal btn-reveal-${id}" type="button" data-action="reveal" data-username-reveal="${u.username}">Reveal</button>` : '';
        return `
        <div class="user-row" style="margin-bottom:10px" data-ip="${currentAgentIp}" data-username="${u.username}">
          <div style="flex:1">
            <div class="value">${u.username}</div>
          </div>
          <div style="flex:1">
            <span id="pw-${id}" class="password-box"></span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${revealBtn}
            <button class="btn-set" type="button" data-username-set="${u.username}">Set Password</button>
          </div>
        </div>
      `}).join('');

      // Attach drag/drop handlers so users can be reordered
      attachUserDragHandlers(currentAgentIp);

      // Set status badges after rendering
      users.forEach(u => {
        if (u.password_claimed === 0) {
          setUserStatus(currentAgentIp, u.username, 0);
        } else if (u.password_claimed === 1) {
          setUserStatus(currentAgentIp, u.username, 1);
        } else if (u.password_claimed === 2) {
          setUserStatus(currentAgentIp, u.username, 2);
        } else {
          setUserStatus(currentAgentIp, u.username, null);
        }
      });
    }catch(e){
      container.innerHTML = `<div class="empty">Failed to load users: ${e.message}</div>`;
      console.error(e);
    }
  }

  async function reveal(username){
    const id = username.replace(/[^a-z0-9_-]/gi,'_');
    try {
      const resp = await fetch(`/get_user_password?ip_address=${encodeURIComponent(currentAgentIp)}&username=${encodeURIComponent(username)}`, {headers:{'Accept':'application/json'}});
      if (!resp.ok) {
        showToast('Failed to retrieve password', 'danger');
        return;
      }
      const data = await resp.json();
      const span = document.getElementById(`pw-${id}`);
      if(span) {
        span.innerText = data.password;
        span.style.display = 'inline-block';
        span.dataset.revealed = 'true';
      }
      // Find and change the Reveal button to Hide
      const userRow = document.querySelector(`[data-username="${username}"]`);
      if(userRow) {
        const revealBtn = userRow.querySelector('.btn-reveal');
        if(revealBtn) {
          revealBtn.innerText = 'Hide';
          revealBtn.dataset.action = 'hide';
        }
      }
    } catch(e) {
      console.error('Error revealing password:', e);
      showToast('Failed to retrieve password', 'danger');
    }
  }

  function hide(username){
    const id = username.replace(/[^a-z0-9_-]/gi,'_');
    const span = document.getElementById(`pw-${id}`);
    if(span) {
      span.innerText = '';
      span.style.display = 'none';
      delete span.dataset.revealed;
    }
    // Change Hide button back to Reveal
    const userRow = document.querySelector(`[data-username="${username}"]`);
    if(userRow) {
      const hideBtn = userRow.querySelector('.btn-reveal');
      if(hideBtn) {
        hideBtn.innerText = 'Reveal';
        hideBtn.dataset.action = 'reveal';
      }
    }
  }

  // Set password modal controls
  function openSetModal(username){
    document.getElementById('setPwdUsername').value = username;
    document.getElementById('setPwdValue').value = '';
    const modal = document.getElementById('setPwdModal');
    modal.style.display = 'flex';
    document.getElementById('setPwdValue').focus();
  }

  function closeSetModal(){
    const modal = document.getElementById('setPwdModal');
    modal.style.display = 'none';
  }

  async function submitSetPwd(e){
    e.preventDefault();
    const username = document.getElementById('setPwdUsername').value;
    const pw = document.getElementById('setPwdValue').value;
    
    try {
      const formData = new FormData();
      formData.append('ip_address', currentAgentIp);
      formData.append('username', username);
      formData.append('password_value', pw);
      // Mark this user's shown status as 'unset' (0) when a new password attempt starts
      try{ setShownStatus(currentAgentIp, username, 0); }catch(e){}
      setUserStatus(currentAgentIp, username, 'pending');
      showToast(username + `: password change submitted`, 'pending', 8000);
      const resp = await fetch('/set_user_password', { method: 'POST', body: formData });
      if (!resp.ok) {
        setUserStatus(currentAgentIp, username, null);
        showToast('Failed to set password: ' + await resp.text(), 'danger');
        return;
      }
      closeSetModal();
      // Reload users to update UI
      await loadUsers(currentAgentIp);
      // start background polling to check password change status for this user
      try{ enqueuePoll(currentAgentIp, username, 6, 10000); }catch(e){}
    } catch(e) {
      console.error('Error setting password:', e);
      showToast('Failed to set password', 'danger');
    }
  }

  // Use secure random password: set field to 'RANDOM' and submit using same API
  function useRandomPassword(){
    try{
      document.getElementById('setPwdValue').value = 'RANDOM';
      const ev = new Event('submit', {cancelable: true});
      submitSetPwd(ev);
    }catch(e){
      console.error('Error using random password:', e);
      showToast('Failed to submit random password', 'danger');
    }
  }

    (function(){
    const ip = qs('ip');
    document.getElementById('agentHeader').innerText = ip? `Agent: ${ip}` : 'Agent';
    // Show Add User button only for the special MISC agent (case-insensitive)
    try{
      const btn = document.getElementById('addMiscUserBtn');
      if(btn && ip && String(ip).toUpperCase() === 'MISC') btn.style.display = '';
    }catch(e){}
    if(ip) loadUsers(ip);
  })();

  // Add Misc user modal controls
  function openAddMiscModal(){
    document.getElementById('addMiscUsername').value = '';
    document.getElementById('addMiscModal').style.display = 'flex';
    document.getElementById('addMiscUsername').focus();
  }
  function closeAddMiscModal(){
    document.getElementById('addMiscModal').style.display = 'none';
    try{ document.getElementById('addMiscForm').reset(); }catch(e){}
  }

  async function submitAddMisc(e){
    e.preventDefault();
    const username = document.getElementById('addMiscUsername').value.trim();
    const service = document.getElementById('addMiscService').value.trim();
    if(!username){ showToast('Please enter a username', 'danger'); return; }
    if(!service){ showToast('Please enter a service', 'danger'); return; }
    try{
      // API no longer accepts separate 'service' field — send combined value as username
      const combined = `${service} - ${username}`;
      const form = new FormData();
      form.append('username', combined);
      const resp = await fetch('/add_misc_user', { method: 'POST', body: form });
      if(!resp.ok){ throw new Error('Request failed'); }
      showToast(`User ${combined} added`, 'success', 4000);
      closeAddMiscModal();
      // reload users for current agent
      try{ await loadUsers(currentAgentIp); }catch(e){}
    }catch(err){ console.error(err); showToast('Failed to add user', 'danger'); }
  }

  function showCopyToast(){
    showToast('✓ Copied to clipboard', 'info', 2000);
  }

</script>
