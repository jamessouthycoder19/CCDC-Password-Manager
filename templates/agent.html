<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    body{background:linear-gradient(135deg,#000,#111);color:#fff;font-family:Segoe UI,Arial;padding:24px}
    .container{max-width:900px;margin:0 auto}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .header h2{color:#ff6600;margin:0}
    .user-row{background:rgba(255,255,255,0.03);padding:14px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .label{color:#ccc;font-size:13px}
    .value{color:#fff;font-weight:600}
    .btn-reveal{background:transparent;border:1px solid rgba(255,255,255,0.08);color:#fff;padding:8px 12px;border-radius:6px}
    .btn-set{background:linear-gradient(135deg,#ff6600,#ff8c33);border:none;color:#042033;padding:8px 12px;border-radius:6px}
    .empty{color:#999;padding:40px;text-align:center}
    .password-box{background:rgba(255,102,0,0.15);border:2px solid #ff6600;padding:12px 16px;border-radius:8px;font-size:16px;font-weight:700;color:#fff;font-family:monospace;cursor:pointer;user-select:none;min-width:120px;display:none}
    .password-box:hover{background:rgba(255,102,0,0.25)}
    .copy-toast{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.9);border:2px solid #ff6600;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;z-index:9999;animation:slideIn 0.3s ease-out}
    @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="display:flex;gap:12px;align-items:center">
        <button onclick="goBack()" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:#fff;padding:8px 12px;border-radius:6px"><i class="bi bi-arrow-left"></i></button>
        <h2 id="agentHeader">Agent</h2>
      </div>
      <div>
        <small class="label">IP:</small>
        <div id="agentIp" class="value"></div>
      </div>
    </div>

    <div id="usersContainer"></div>

    <!-- Set Password Modal -->
    <div class="modal-overlay" id="setPwdModal" style="display:none;align-items:center;justify-content:center;">
      <div class="modal-content" style="max-width:420px;">
        <div class="modal-header">
          <h3 class="modal-title">Set Password</h3>
          <button class="modal-close" onclick="closeSetModal()"><i class="bi bi-x"></i></button>
        </div>
        <form id="setPwdForm" onsubmit="submitSetPwd(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="setPwdUsername" class="form-control" readonly />
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="setPwdValue" class="form-control" placeholder="Enter new password" required />
          </div>
          <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeSetModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-primary">Set Password</button>
          </div>
        </form>
      </div>
    </div>

  </div>

<script>
  let currentAgentIp = null;

  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function goBack(){ window.location.href = '/dashboard' }

  // Attach event listeners once to the users container using event delegation
  const container = document.getElementById('usersContainer');
  container.addEventListener('click', (e) => {
    if(e.target.classList.contains('btn-reveal')) {
      e.preventDefault();
      e.stopPropagation();
      const username = e.target.dataset.usernameReveal;
      const action = e.target.dataset.action;
      if(action === 'reveal') {
        reveal(username);
      } else if(action === 'hide') {
        hide(username);
      }
    }
    if(e.target.classList.contains('btn-set')) {
      e.preventDefault();
      e.stopPropagation();
      const username = e.target.dataset.usernameSet;
      openSetModal(username);
    }
    if(e.target.classList.contains('password-box')) {
      e.preventDefault();
      e.stopPropagation();
      const password = e.target.innerText;
      navigator.clipboard.writeText(password).then(() => {
        showCopyToast();
      }).catch(() => {
        alert('Failed to copy password');
      });
    }
  });

  async function loadUsers(ip){
    currentAgentIp = ip;
    const container = document.getElementById('usersContainer');
    container.innerHTML = '<div class="empty">Loading users...</div>';
    try{
      const resp = await fetch(`/get_users?ip_address=${encodeURIComponent(ip)}`, {headers:{'Accept':'application/json'}});
      if(!resp.ok) throw new Error('Failed to fetch');
      const data = await resp.json();
      const users = data.users || [];
      if(users.length===0){ container.innerHTML = '<div class="empty">No users found</div>'; return }

      function sanitizeName(n){ return n.replace(/[^a-z0-9_-]/gi,'_'); }
      container.innerHTML = users.map(u => {
        const id = sanitizeName(u.username);
        const revealBtn = u.password_exists ? `<button class="btn-reveal btn-reveal-${id}" type="button" data-action="reveal" data-username-reveal="${u.username}">Reveal</button>` : '';
        return `
        <div class="user-row" style="margin-bottom:10px" data-username="${u.username}">
          <div style="flex:1">
            <div class="value">${u.username}</div>
          </div>
          <div style="flex:1">
            <span id="pw-${id}" class="password-box"></span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${revealBtn}
            <button class="btn-set" type="button" data-username-set="${u.username}">Set Password</button>
          </div>
        </div>
      `}).join('');
    }catch(e){
      container.innerHTML = `<div class="empty">Failed to load users: ${e.message}</div>`;
      console.error(e);
    }
  }

  async function reveal(username){
    const id = username.replace(/[^a-z0-9_-]/gi,'_');
    try {
      const resp = await fetch(`/get_user_password?ip_address=${encodeURIComponent(currentAgentIp)}&username=${encodeURIComponent(username)}`, {headers:{'Accept':'application/json'}});
      if (!resp.ok) {
        alert('Failed to retrieve password');
        return;
      }
      const data = await resp.json();
      const span = document.getElementById(`pw-${id}`);
      if(span) {
        span.innerText = data.password;
        span.style.display = 'inline-block';
        span.dataset.revealed = 'true';
      }
      // Find and change the Reveal button to Hide
      const userRow = document.querySelector(`[data-username="${username}"]`);
      if(userRow) {
        const revealBtn = userRow.querySelector('.btn-reveal');
        if(revealBtn) {
          revealBtn.innerText = 'Hide';
          revealBtn.dataset.action = 'hide';
        }
      }
    } catch(e) {
      console.error('Error revealing password:', e);
      alert('Failed to retrieve password');
    }
  }

  function hide(username){
    const id = username.replace(/[^a-z0-9_-]/gi,'_');
    const span = document.getElementById(`pw-${id}`);
    if(span) {
      span.innerText = '';
      span.style.display = 'none';
      delete span.dataset.revealed;
    }
    // Change Hide button back to Reveal
    const userRow = document.querySelector(`[data-username="${username}"]`);
    if(userRow) {
      const hideBtn = userRow.querySelector('.btn-reveal');
      if(hideBtn) {
        hideBtn.innerText = 'Reveal';
        hideBtn.dataset.action = 'reveal';
      }
    }
  }

  // Set password modal controls
  function openSetModal(username){
    document.getElementById('setPwdUsername').value = username;
    document.getElementById('setPwdValue').value = '';
    const modal = document.getElementById('setPwdModal');
    modal.style.display = 'flex';
    document.getElementById('setPwdValue').focus();
  }

  function closeSetModal(){
    const modal = document.getElementById('setPwdModal');
    modal.style.display = 'none';
  }

  async function submitSetPwd(e){
    e.preventDefault();
    const username = document.getElementById('setPwdUsername').value;
    const pw = document.getElementById('setPwdValue').value;
    
    try {
      const formData = new FormData();
      formData.append('ip_address', currentAgentIp);
      formData.append('username', username);
      formData.append('password_value', pw);
      const resp = await fetch('/set_user_password', { method: 'POST', body: formData });
      if (!resp.ok) {
        alert('Failed to set password');
        return;
      }
      alert(`Password for ${username} set successfully!`);
      closeSetModal();
      // Reload users to update UI
      await loadUsers(currentAgentIp);
    } catch(e) {
      console.error('Error setting password:', e);
      alert('Failed to set password');
    }
  }

  (function(){
    const ip = qs('ip');
    document.getElementById('agentHeader').innerText = ip? `Agent: ${ip}` : 'Agent';
    document.getElementById('agentIp').innerText = ip || 'N/A';
    if(ip) loadUsers(ip);
  })();

  function showCopyToast(){
    const toast = document.createElement('div');
    toast.className = 'copy-toast';
    toast.innerText = '✓ Copied to clipboard';
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.remove();
    }, 2000);
  }

</script>
</body>
</html>
